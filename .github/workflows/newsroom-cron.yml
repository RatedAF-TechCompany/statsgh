name: Newsroom Scheduled Scan

on:
  schedule:
    # Run every 15 minutes to match pg_cron frequency
    - cron: '*/15 * * * *'
  workflow_dispatch: # Allow manual trigger from GitHub Actions UI

jobs:
  trigger-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Newsroom Scan
        run: |
          curl -X POST \
            "https://ofhejtwaigiqyejbvncz.supabase.co/functions/v1/newsroom-scheduled?token=statsgh-newsroom-2026" \
            -H "Content-Type: application/json" \
            -d '{"triggerType": "scheduled"}' \
            --fail-with-body \
            --max-time 300
